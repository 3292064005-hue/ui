name: mainline

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Repo hygiene
        run: |
          chmod +x scripts/check_repo_hygiene.sh
          ./scripts/check_repo_hygiene.sh

  python-mainline:
    runs-on: ubuntu-22.04
    needs: hygiene
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run curated Python tests
        run: |
          python -m pytest -q

  cpp-mainline:
    runs-on: ubuntu-22.04
    needs: hygiene
    steps:
      - uses: actions/checkout@v4
      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libssl-dev libprotobuf-dev protobuf-compiler libeigen3-dev
      - name: Configure and build spine_robot_core
        run: |
          cmake -S cpp_robot_core -B cpp_robot_core/build -DCMAKE_BUILD_TYPE=Release
          cmake --build cpp_robot_core/build -j4
      - name: Run C++ smoke tests
        run: |
          ctest --test-dir cpp_robot_core/build --output-on-failure

  mock-e2e:
    runs-on: ubuntu-22.04
    needs: hygiene
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run mock mainline integration slice
        run: |
          python -m pytest -q tests/test_mainline_mock_e2e.py

  frontend-build:
    runs-on: ubuntu-22.04
    needs: hygiene
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui_frontend/package-lock.json
      - name: Build frontend against the v1 adapter contract
        working-directory: ui_frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

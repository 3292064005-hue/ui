name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  quick_quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy
      - name: Quality contracts
        run: python scripts/verify_quality_contracts.py
      - name: Regenerate contract docs and ensure clean tree
        run: |
          python scripts/regenerate_quality_contracts.py
          git diff --exit-code -- docs
      - name: Unit and regression tests
        run: pytest tests/unit tests/regression -q

  full_validation:
    runs-on: ubuntu-22.04
    needs: quick_quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Tests with coverage gate
        run: pytest --cov=src/robot_sim --cov-report=term-missing -q

  gui_smoke:
    runs-on: ubuntu-22.04
    needs: quick_quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[gui,dev]
      - name: GUI smoke
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/gui -q

  release_validation:
    runs-on: ubuntu-22.04
    needs: full_validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install package and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build
      - name: Build distribution artifacts
        run: python -m build
      - name: Reinstall built wheel
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Smoke installed bootstrap/container
        run: |
          python -c "import robot_sim; import robot_sim.app.bootstrap; import robot_sim.app.version"
          python -c "from robot_sim.app.bootstrap import bootstrap; root, container = bootstrap(); assert container.runtime_context['config_root']; assert container.runtime_context['export_root']; print(root); print(container.runtime_context['config_root'])"
      - name: Release package validation
        run: pytest tests/test_release_package.py -q

  scheduled_canary:
    if: github.event_name == 'schedule'
    continue-on-error: true
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Canary tests
        run: pytest tests/unit tests/regression -q
